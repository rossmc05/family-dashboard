<!DOCTYPE html>
 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The McNaughtons' Little Life</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Segoe UI’, system-ui, sans-serif;
background: #1a1a2e;
color: #fff;
min-height: 100vh;
overflow-x: hidden;
}

/* Background slideshow */
#bg-slideshow {
position: fixed;
inset: 0;
z-index: 0;
}
.bg-slide {
position: absolute;
inset: 0;
background-size: cover;
background-position: center;
opacity: 0;
transition: opacity 2s ease-in-out;
}
.bg-slide.active { opacity: 1; }
.bg-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.55);
z-index: 1;
}

/* Layout */
.dashboard {
position: relative;
z-index: 2;
max-width: 1400px;
margin: 0 auto;
padding: 20px;
}

header {
text-align: center;
margin-bottom: 20px;
}
header h1 {
font-size: clamp(1.8rem, 4vw, 3rem);
font-weight: 300;
letter-spacing: 2px;
text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

.grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
grid-template-rows: auto;
gap: 16px;
}

.card {
background: rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
border: 1px solid rgba(255,255,255,0.12);
border-radius: 16px;
padding: 18px;
box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.card-title {
font-size: 0.7rem;
text-transform: uppercase;
letter-spacing: 2px;
color: rgba(255,255,255,0.5);
margin-bottom: 12px;
}

/* Weather */
.weather-card {
grid-column: 1;
grid-row: 1;
}
.weather-main {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 12px;
}
.weather-temp {
font-size: 3rem;
font-weight: 200;
line-height: 1;
}
.weather-icon { font-size: 2.5rem; }
.weather-desc { font-size: 0.9rem; color: rgba(255,255,255,0.7); }
.weather-feels { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
.weather-forecast {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 6px;
margin-top: 10px;
}
.forecast-day {
text-align: center;
background: rgba(255,255,255,0.06);
border-radius: 10px;
padding: 8px 4px;
}
.forecast-day .day-name { font-size: 0.7rem; color: rgba(255,255,255,0.6); }
.forecast-day .day-icon { font-size: 1.2rem; margin: 4px 0; }
.forecast-day .day-hi { font-size: 0.85rem; }
.forecast-day .day-lo { font-size: 0.75rem; color: rgba(255,255,255,0.5); }

/* Clock */
.clock-card {
grid-column: 2;
grid-row: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
}
#clock-time {
font-size: clamp(2.5rem, 5vw, 4rem);
font-weight: 100;
letter-spacing: 4px;
line-height: 1;
}
#clock-date {
font-size: 1rem;
color: rgba(255,255,255,0.6);
margin-top: 8px;
}

/* Upcoming events */
.upcoming-card {
grid-column: 3;
grid-row: 1;
overflow: hidden;
}
.event-item {
display: flex;
gap: 10px;
margin-bottom: 10px;
padding-bottom: 10px;
border-bottom: 1px solid rgba(255,255,255,0.08);
align-items: flex-start;
}
.event-item:last-child { border-bottom: none; margin-bottom: 0; }
.event-date-badge {
min-width: 38px;
text-align: center;
background: rgba(100,180,255,0.2);
border-radius: 8px;
padding: 4px;
}
.event-date-badge .badge-day { font-size: 1.1rem; font-weight: 600; line-height: 1; }
.event-date-badge .badge-month { font-size: 0.6rem; color: rgba(255,255,255,0.6); text-transform: uppercase; }
.event-info { flex: 1; }
.event-title { font-size: 0.85rem; font-weight: 500; }
.event-time { font-size: 0.72rem; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* Weekly calendar */
.weekly-card {
grid-column: 1 / 3;
grid-row: 2;
}
.week-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 6px;
}
.week-day-col { text-align: center; }
.week-day-name {
font-size: 0.65rem;
color: rgba(255,255,255,0.5);
text-transform: uppercase;
margin-bottom: 6px;
}
.week-day-num {
width: 32px;
height: 32px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
margin: 0 auto 6px;
font-size: 0.9rem;
cursor: default;
}
.week-day-num.today {
background: rgba(100,180,255,0.6);
font-weight: 700;
}
.week-event {
font-size: 0.62rem;
background: rgba(100,200,120,0.25);
border-left: 2px solid rgba(100,200,120,0.8);
border-radius: 3px;
padding: 2px 4px;
margin-bottom: 3px;
text-align: left;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

/* Monthly calendar */
.monthly-card {
grid-column: 3;
grid-row: 2 / 4;
overflow: hidden;
}
.month-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 10px;
}
.month-nav {
background: rgba(255,255,255,0.1);
border: none;
color: #fff;
width: 28px;
height: 28px;
border-radius: 50%;
cursor: pointer;
font-size: 1rem;
display: flex;align-items:center;justify-content:center;
}
.month-title { font-size: 1rem; font-weight: 500; }
.month-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 2px;
}
.month-weekday {
text-align: center;
font-size: 0.6rem;
color: rgba(255,255,255,0.4);
padding: 4px 0;
text-transform: uppercase;
}
.month-day {
text-align: center;
padding: 4px 2px;
border-radius: 6px;
font-size: 0.75rem;
min-height: 32px;
cursor: default;
position: relative;
}
.month-day.other-month { color: rgba(255,255,255,0.2); }
.month-day.today-month {
background: rgba(100,180,255,0.4);
font-weight: 700;
}
.month-day.has-event::after {
content: ‘’;
display: block;
width: 4px;
height: 4px;
background: #7ecfff;
border-radius: 50%;
margin: 2px auto 0;
}

/* Photo strip */
.photos-card {
grid-column: 1 / 3;
grid-row: 3;
}
.photo-strip {
display: flex;
gap: 8px;
overflow-x: auto;
scrollbar-width: none;
padding-bottom: 4px;
}
.photo-strip::-webkit-scrollbar { display: none; }
.photo-thumb {
min-width: 120px;
height: 90px;
border-radius: 10px;
object-fit: cover;
flex-shrink: 0;
background: rgba(255,255,255,0.1);
}
.photo-placeholder {
min-width: 120px;
height: 90px;
border-radius: 10px;
background: rgba(255,255,255,0.08);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
color: rgba(255,255,255,0.4);
font-size: 0.7rem;
text-align: center;
padding: 8px;
flex-shrink: 0;
}

.loading { color: rgba(255,255,255,0.4); font-size: 0.85rem; text-align: center; padding: 20px; }
.error-msg { color: rgba(255,150,150,0.8); font-size: 0.75rem; padding: 6px; }

@media (max-width: 900px) {
.grid {
grid-template-columns: 1fr 1fr;
}
.weekly-card { grid-column: 1 / 3; grid-row: 3; }
.monthly-card { grid-column: 1 / 3; grid-row: 2; }
.photos-card { grid-column: 1 / 3; grid-row: 4; }
.clock-card { grid-column: 2; grid-row: 1; }
.upcoming-card { grid-column: 1 / 3; grid-row: 5; }
}
@media (max-width: 600px) {
.grid { grid-template-columns: 1fr; }
.weekly-card, .monthly-card, .photos-card, .upcoming-card { grid-column: 1; }
}
</style>

</head>

<script>
// ── CLOCK ──────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${h}:${m}`;
  document.getElementById('clock-date').textContent = now.toLocaleDateString('en-CA', {
    weekday:'long', year:'numeric', month:'long', day:'numeric'
  });
}
updateClock();
setInterval(updateClock, 1000);

// ── WEATHER ────────────────────────────────────────────────────────
const WX_ICONS = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
  45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌧️',
  61:'🌧️',63:'🌧️',65:'🌧️',
  71:'🌨️',73:'🌨️',75:'❄️',
  80:'🌦️',81:'🌧️',82:'⛈️',
  95:'⛈️',96:'⛈️',99:'⛈️'
};
const WX_DESC = {
  0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
  45:'Foggy',48:'Icy fog',
  51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',
  71:'Light snow',73:'Snow',75:'Heavy snow',
  80:'Light showers',81:'Showers',82:'Heavy showers',
  95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'
};

async function loadWeather(lat, lon) {
  const el = document.getElementById('weather-content');
  const urls = [
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=celsius&timezone=America%2FDenver&forecast_days=5`,
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&temperature_unit=celsius&timezone=America%2FDenver&forecast_days=5`
  ];
  let d = null;
  for (const url of urls) {
    try {
      const r = await fetch(url);
      if (r.ok) { d = await r.json(); break; }
    } catch(e) {}
  }
  if (!d) {
    el.innerHTML = '<div class="error-msg">⚠️ Weather will load when running as a local file on your Mac.<br><br>Open-Meteo is blocked inside the Claude preview sandbox.</div>';
    return;
  }
  // support both API response shapes
  const cur = d.current || d.current_weather || {};
  const code = cur.weather_code ?? cur.weathercode ?? 0;
  const temp = cur.temperature_2m ?? cur.temperature ?? '–';
  const feels = cur.apparent_temperature ?? '–';
  const daily = d.daily || {};
  const times = daily.time || [];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let forecastHTML = '';
  for (let i = 1; i <= Math.min(4, times.length-1); i++) {
    const dt = new Date(times[i]+'T12:00:00');
    const dc = (daily.weather_code||daily.weathercode||[])[i] ?? 0;
    forecastHTML += `<div class="forecast-day">
      <div class="day-name">${days[dt.getDay()]}</div>
      <div class="day-icon">${WX_ICONS[dc]||'🌡️'}</div>
      <div class="day-hi">${Math.round((daily.temperature_2m_max||[])[i]??0)}°</div>
      <div class="day-lo">${Math.round((daily.temperature_2m_min||[])[i]??0)}°</div>
    </div>`;
  }
  el.innerHTML = `
    <div class="weather-main">
      <div class="weather-icon">${WX_ICONS[code]||'🌡️'}</div>
      <div>
        <div class="weather-temp">${typeof temp==='number'?Math.round(temp):temp}°C</div>
        <div class="weather-desc">${WX_DESC[code]||'–'}</div>
        ${feels!=='–'?`<div class="weather-feels">Feels like ${Math.round(feels)}°</div>`:''}
      </div>
    </div>
    <div class="weather-forecast">${forecastHTML}</div>`;
}
// refresh weather every 10 minutes
setInterval(() => loadWeather(51.0447, -114.0719), 600000);

// Calgary, AB coordinates
loadWeather(51.0447, -114.0719);

// ── CALENDAR ───────────────────────────────────────────────────────
const CAL_URL = 'webcal://p58-caldav.icloud.com/published/2/MTAwMzMzOTgxMTAwMzMzOeRx7owgHoBn3si23dlCBoVPkDfkX3KzWwXgtKqyboafExi6t2dl4GIQtBaVq-ZyfDaJ6Bfa4ugJ5I8GjgjoqLs';
const PROXY_URL = CAL_URL.replace('webcal://', 'https://');
let allEvents = [];
let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();

function parseICS(text) {
  const events = [];
  const blocks = text.split('BEGIN:VEVENT');
  for (let i = 1; i < blocks.length; i++) {
    const b = blocks[i];
    const get = (k) => {
      const m = b.match(new RegExp(k + '[^:]*:([^\r\n]+)'));
      return m ? m[1].trim() : '';
    };
    const dtraw = get('DTSTART') || get('DTSTART;VALUE=DATE') || get('DTSTART;TZID=[^:]+');
    const dtend = get('DTEND') || get('DTEND;VALUE=DATE') || '';
    const title = get('SUMMARY').replace(/\\,/g,',').replace(/\\n/g,' ');
    if (!dtraw || !title) continue;
    const parseDate = (s) => {
      s = s.replace(/[^0-9T]/g,'');
      if (s.length === 8) return new Date(s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8));
      if (s.length >= 15) return new Date(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8), +s.slice(9,11), +s.slice(11,13));
      return null;
    };
    const start = parseDate(dtraw);
    if (start && !isNaN(start)) {
      events.push({ title, start, allDay: dtraw.length === 8 });
    }
  }
  events.sort((a,b) => a.start - b.start);
  return events;
}

async function loadCalendar() {
  // Try multiple CORS proxies
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(PROXY_URL)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(PROXY_URL)}`,
    `https://cors-anywhere.herokuapp.com/${PROXY_URL}`
  ];
  let text = null;
  for (const proxy of proxies) {
    try {
      const r = await fetch(proxy, { signal: AbortSignal.timeout(6000) });
      if (r.ok) { text = await r.text(); break; }
    } catch {}
  }
  if (!text) {
    // Show demo events as fallback
    allEvents = getDemoEvents();
    renderAll();
    document.getElementById('upcoming-content').insertAdjacentHTML('beforeend',
      '<div class="error-msg" style="margin-top:8px">⚠️ Calendar loaded in demo mode — live iCal blocked by browser CORS policy. Open this HTML locally or host it to enable live sync.</div>');
    return;
  }
  allEvents = parseICS(text);
  renderAll();
}

function getDemoEvents() {
  const y = new Date().getFullYear(), m = new Date().getMonth();
  return [
    { title: 'Luca appt w Braxtyn', start: new Date(y,m,3,11,0) },
    { title: 'Ross field', start: new Date(y,m,5,7,0) },
    { title: 'U9 Northwest Warriors 3', start: new Date(y,m,7,8,30) },
    { title: 'Willa hockey', start: new Date(y,m,7,13,30) },
    { title: 'Luca Swim', start: new Date(y,m,7,15,45) },
    { title: 'U9 NW Warriors vs SW 3 Blue', start: new Date(y,m,8,9,0) },
    { title: 'Jake b day', start: new Date(y,m,8,14,30) },
    { title: 'Mum & Willa nails w Kendall', start: new Date(y,m,14,0,0) },
  ];
}

function fmtTime(d) {
  if (d.getHours()===0 && d.getMinutes()===0) return 'All day';
  const h = d.getHours()%12||12, mn = String(d.getMinutes()).padStart(2,'0');
  return `${h}:${mn} ${d.getHours()<12?'AM':'PM'}`;
}

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderAll() {
  renderUpcoming();
  renderWeekly();
  renderMonthly();
}

function renderUpcoming() {
  const now = new Date(); now.setHours(0,0,0,0);
  const upcoming = allEvents.filter(e => e.start >= now).slice(0,6);
  if (!upcoming.length) { document.getElementById('upcoming-content').innerHTML = '<div class="loading">No upcoming events</div>'; return; }
  document.getElementById('upcoming-content').innerHTML = upcoming.map(e => `
    <div class="event-item">
      <div class="event-date-badge">
        <div class="badge-day">${e.start.getDate()}</div>
        <div class="badge-month">${MONTHS[e.start.getMonth()].slice(0,3)}</div>
      </div>
      <div class="event-info">
        <div class="event-title">${e.title}</div>
        <div class="event-time">${fmtTime(e.start)}</div>
      </div>
    </div>`).join('');
}

function renderWeekly() {
  const now = new Date();
  const dow = now.getDay();
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - dow); weekStart.setHours(0,0,0,0);
  let html = '<div class="week-grid">';
  for (let d = 0; d < 7; d++) {
    const day = new Date(weekStart); day.setDate(weekStart.getDate() + d);
    const isToday = day.toDateString() === now.toDateString();
    const dayEvts = allEvents.filter(e => e.start.toDateString() === day.toDateString());
    const evtHTML = dayEvts.slice(0,3).map(e => `<div class="week-event" title="${e.title}">${e.title}</div>`).join('');
    html += `<div class="week-day-col">
      <div class="week-day-name">${WDAYS[d]}</div>
      <div class="week-day-num${isToday?' today':''}">${day.getDate()}</div>
      ${evtHTML}
    </div>`;
  }
  html += '</div>';
  document.getElementById('weekly-content').innerHTML = html;
}

function renderMonthly() {
  document.getElementById('month-title').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const first = new Date(viewYear, viewMonth, 1);
  const last = new Date(viewYear, viewMonth+1, 0);
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '<div class="month-grid">';
  WDAYS.forEach(d => html += `<div class="month-weekday">${d}</div>`);
  for (let i = 0; i < first.getDay(); i++) {
    const prev = new Date(viewYear, viewMonth, -first.getDay()+i+1);
    html += `<div class="month-day other-month">${prev.getDate()}</div>`;
  }
  for (let d = 1; d <= last.getDate(); d++) {
    const dt = new Date(viewYear, viewMonth, d);
    const isToday = dt.toDateString() === today.toDateString();
    const hasEvt = allEvents.some(e => e.start.toDateString() === dt.toDateString());
    html += `<div class="month-day${isToday?' today-month':''}${hasEvt?' has-event':''}">${d}</div>`;
  }
  const remain = 42 - (first.getDay() + last.getDate());
  for (let d = 1; d <= remain; d++) html += `<div class="month-day other-month">${d}</div>`;
  html += '</div>';
  document.getElementById('monthly-content').innerHTML = html;
}

document.getElementById('prev-month').onclick = () => {
  viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderMonthly();
};
document.getElementById('next-month').onclick = () => {
  viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderMonthly();
};

loadCalendar();

// ── PHOTO LOADER ──────────────────────────────────────────────────
const photoInput = document.getElementById('photo-input');
const photoStrip = document.getElementById('photo-strip');
let photoURLs = JSON.parse(localStorage.getItem('dashPhotos') || '[]');

function renderPhotos() {
  if (!photoURLs.length) return;
  photoStrip.innerHTML = '';
  photoURLs.forEach((src, i) => {
    const img = document.createElement('img');
    img.className = 'photo-thumb';
    img.src = src;
    img.title = 'Click to remove';
    img.onclick = () => { photoURLs.splice(i,1); saveAndRender(); };
    photoStrip.appendChild(img);
  });
}

function saveAndRender() {
  try { localStorage.setItem('dashPhotos', JSON.stringify(photoURLs)); } catch(e) {}
  renderPhotos();
}

photoInput.addEventListener('change', (e) => {
  const files = Array.from(e.target.files);
  let loaded = 0;
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      photoURLs.push(ev.target.result);
      loaded++;
      if (loaded === files.length) saveAndRender();
    };
    reader.readAsDataURL(f);
  });
  e.target.value = '';
});

renderPhotos();

// ── BACKGROUND SLIDESHOW (placeholder sunsets) ────────────────────
const bgColors = [
  'linear-gradient(135deg,#0d1b2a 0%,#1b2838 40%,#2c3e50 100%)',
  'linear-gradient(135deg,#1a0533 0%,#3d1054 40%,#6a2c70 100%)',
  'linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%)',
  'linear-gradient(135deg,#200122 0%,#6f0000 100%)',
  'linear-gradient(135deg,#093028 0%,#237a57 100%)'
];
const ss = document.getElementById('bg-slideshow');
bgColors.forEach((bg, i) => {
  const s = document.createElement('div');
  s.className = 'bg-slide' + (i===0?' active':'');
  s.style.background = bg;
  ss.appendChild(s);
});
let curSlide = 0;
setInterval(() => {
  const slides = document.querySelectorAll('.bg-slide');
  slides[curSlide].classList.remove('active');
  curSlide = (curSlide+1) % slides.length;
  slides[curSlide].classList.add('active');
}, 8000);
</script>

</body>
